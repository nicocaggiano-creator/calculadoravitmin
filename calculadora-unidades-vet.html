<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Unidades</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      line-height: 1.5;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e9ecef;
    }
    
    .header-icons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .header-icons img {
      width: 44px;
      height: 44px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 13px;
      color: #6c757d;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #dee2e6;
      background: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #495057;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: #f8f9fa;
    }
    
    .tab-btn.active {
      background: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    
    .panel {
      display: none;
    }
    
    .panel.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #495057;
      margin-bottom: 6px;
    }
    
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      transition: border-color 0.2s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #0d6efd;
    }
    
    .results-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    
    .results-title {
      font-size: 13px;
      color: #6c757d;
      margin-bottom: 12px;
    }
    
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e9ecef;
    }
    
    .result-row:last-child {
      border-bottom: none;
    }
    
    .result-label {
      color: #6c757d;
      font-size: 14px;
    }
    
    .result-value {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
    }
    
    .info-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: #e7f1ff;
      border-left: 3px solid #0d6efd;
      border-radius: 0 8px 8px 0;
    }
    
    .info-box p {
      font-size: 13px;
      color: #0d6efd;
    }
    
    .info-box strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icons">
        <img src="https://cdn.jsdelivr.net/npm/@svgmoji/twemoji@2.0.0/svg/1F436.svg" alt="perro">
        <img src="https://cdn.jsdelivr.net/npm/@svgmoji/twemoji@2.0.0/svg/1F431.svg" alt="gato">
      </div>
      <h1>Calculadora de unidades</h1>
      <p>Minerales y vitaminas para pequeños animales</p>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" id="btn-minerales" onclick="setTab('minerales')">Minerales (masa)</button>
      <button class="tab-btn" id="btn-vitaminas" onclick="setTab('vitaminas')">Vitaminas (UI ↔ masa)</button>
    </div>
    
    <div class="panel active" id="panel-minerales">
      <div class="form-row">
        <div class="form-group">
          <label for="min-valor">Valor</label>
          <input type="number" id="min-valor" value="1" oninput="convertirMinerales()">
        </div>
        <div class="form-group">
          <label for="min-unidad">Unidad</label>
          <select id="min-unidad" onchange="convertirMinerales()">
            <option value="g">Gramo (g)</option>
            <option value="mg" selected>Miligramo (mg)</option>
            <option value="mcg">Microgramo (μg)</option>
            <option value="ng">Nanogramo (ng)</option>
          </select>
        </div>
      </div>
      
      <div class="results-box">
        <p class="results-title">Equivalencias:</p>
        <div id="min-resultados"></div>
      </div>
      
      <div class="info-box">
        <p><strong>Recordatorio:</strong> 1 g = 1.000 mg = 1.000.000 μg = 1.000.000.000 ng</p>
      </div>
    </div>
    
    <div class="panel" id="panel-vitaminas">
      <div class="form-group">
        <label for="vit-tipo">Vitamina</label>
        <select id="vit-tipo" onchange="convertirVitaminas()">
          <option value="A">Vitamina A (retinol)</option>
          <option value="D">Vitamina D (colecalciferol)</option>
          <option value="E">Vitamina E (α-tocoferol)</option>
        </select>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="vit-valor">Valor</label>
          <input type="number" id="vit-valor" value="1000" oninput="convertirVitaminas()">
        </div>
        <div class="form-group">
          <label for="vit-unidad">Unidad de entrada</label>
          <select id="vit-unidad" onchange="convertirVitaminas()">
            <option value="UI">UI (Unidades Internacionales)</option>
            <option value="mcg">μg (microgramos)</option>
            <option value="mg">mg (miligramos)</option>
          </select>
        </div>
      </div>
      
      <div class="results-box">
        <p class="results-title">Equivalencias:</p>
        <div id="vit-resultados"></div>
      </div>
      
      <div class="info-box" id="vit-info"></div>
    </div>
  </div>

  <script>
    const factoresVit = {
      A: { nombre: "Vitamina A (retinol)", uiToMcg: 0.3, nota: "1 UI = 0,3 μg de retinol" },
      D: { nombre: "Vitamina D (colecalciferol)", uiToMcg: 0.025, nota: "1 UI = 0,025 μg (40 UI por μg)" },
      E: { nombre: "Vitamina E (α-tocoferol)", uiToMg: 0.67, nota: "1 UI = 0,67 mg de d-α-tocoferol (natural)" }
    };

    function setTab(tab) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      document.getElementById('btn-' + tab).classList.add('active');
      
      if (tab === 'minerales') convertirMinerales();
      else convertirVitaminas();
    }

    function convertirMinerales() {
      const valor = parseFloat(document.getElementById('min-valor').value) || 0;
      const unidad = document.getElementById('min-unidad').value;
      const factores = { g: 1, mg: 1000, mcg: 1000000, ng: 1000000000 };
      const nombres = { g: 'g', mg: 'mg', mcg: 'μg', ng: 'ng' };
      const valorEnG = valor / factores[unidad];
      
      let html = '';
      for (const u of ['g', 'mg', 'mcg', 'ng']) {
        if (u !== unidad) {
          const resultado = valorEnG * factores[u];
          const formato = formatNumber(resultado);
          html += `<div class="result-row"><span class="result-label">${nombres[u]}</span><span class="result-value">${formato}</span></div>`;
        }
      }
      document.getElementById('min-resultados').innerHTML = html;
    }

    function convertirVitaminas() {
      const tipo = document.getElementById('vit-tipo').value;
      const valor = parseFloat(document.getElementById('vit-valor').value) || 0;
      const unidad = document.getElementById('vit-unidad').value;
      const vit = factoresVit[tipo];
      let ui, mcg, mg;

      if (tipo === 'E') {
        if (unidad === 'UI') { ui = valor; mg = valor * vit.uiToMg; mcg = mg * 1000; }
        else if (unidad === 'mg') { mg = valor; ui = valor / vit.uiToMg; mcg = mg * 1000; }
        else { mcg = valor; mg = valor / 1000; ui = mg / vit.uiToMg; }
      } else {
        if (unidad === 'UI') { ui = valor; mcg = valor * vit.uiToMcg; mg = mcg / 1000; }
        else if (unidad === 'mcg') { mcg = valor; ui = valor / vit.uiToMcg; mg = mcg / 1000; }
        else { mg = valor; mcg = valor * 1000; ui = mcg / vit.uiToMcg; }
      }

      let html = '';
      if (unidad !== 'UI') html += `<div class="result-row"><span class="result-label">UI</span><span class="result-value">${formatNumber(ui)}</span></div>`;
      if (unidad !== 'mcg') html += `<div class="result-row"><span class="result-label">μg</span><span class="result-value">${formatNumber(mcg)}</span></div>`;
      if (unidad !== 'mg') html += `<div class="result-row"><span class="result-label">mg</span><span class="result-value">${formatNumber(mg)}</span></div>`;
      
      document.getElementById('vit-resultados').innerHTML = html;
      document.getElementById('vit-info').innerHTML = `<p><strong>Factor:</strong> ${vit.nota}</p>`;
    }

    function formatNumber(n) {
      if (n === 0) return '0';
      if (Math.abs(n) < 0.001) return n.toExponential(2);
      if (Math.abs(n) >= 1000000) return n.toExponential(2);
      return n.toLocaleString('es-AR', { maximumFractionDigits: 4 });
    }

    // Inicializar
    convertirMinerales();
  </script>
</body>
</html>
